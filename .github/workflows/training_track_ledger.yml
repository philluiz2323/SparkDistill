name: Training track ledger

on:
  # Runs once a training-track PR has actually merged — separate from the
  # pre-merge gate (training_track.yml), which only labels/closes. The ledger
  # is an immutable record of merged runs (see runs/README.md), so it's written
  # after merge, not at every push. Fires on every merged PR regardless of
  # track; eval.record_training_ledger no-ops silently when the PR body cites
  # no HF proof-bundle repo.
  pull_request_target:
    types: [closed]
    paths-ignore:
      - "datasets/registry.jsonl"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: training-track-ledger-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  record-ledger:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity for automated commits
        run: |
          git config --global user.name "gittensor-eval-bot"
          git config --global user.email "gittensor-eval-bot@users.noreply.github.com"

      - name: Extract PR body and changed paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" > /tmp/pr_body.md
          git diff --name-only "${BASE_SHA}" "${MERGE_SHA}" > /tmp/changed_paths.txt

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install SparkDistill
        run: uv sync --extra dev --extra proof --frozen

      - name: Record ledger entry
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          uv run python -m eval.record_training_ledger \
            --pr-url "$PR_URL" \
            --pr-body-file /tmp/pr_body.md \
            --head-ref main \
            --changed-paths-file /tmp/changed_paths.txt

      - name: Commit ledger entry if changed
        run: |
          if git status --porcelain -- runs/ | grep -q .; then
            git add runs/
            git commit -m "Record ledger entry for #${{ github.event.pull_request.number }}"
            git push origin HEAD:main
          else
            echo "no ledger changes to commit"
          fi
