# Optimized mining SFT for magicrails — 174-row canonical pin (e6fe3e64).
# Trains on pinned sparkproof-mining only; submit this yaml in a training-track PR.
#
#   scripts/prepare_mining_sft.sh
#   scripts/train.sh recipes/qwen3.5-4b-phase1/sft-mining-magicrails-v1.yaml
#   scripts/eval.sh --checkpoint outputs/qwen3.5-4b-mining-magicrails-v1 --compare-frontier --frontier-scores runs/frontier.json

base_model: Qwen/Qwen3.5-4B
trust_remote_code: true

chat_template: qwen3_5
roles_to_train: ["assistant"]

datasets:
  - path: data/processed/sparkproof-mining_sft.jsonl
    type: chat_template
    field_messages: messages

dataset_prepared_path: data/prepared/qwen3.5-4b-mining-magicrails-v1
val_set_size: 0.08
output_dir: outputs/qwen3.5-4b-mining-magicrails-v1

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

adapter: lora
lora_r: 96
lora_alpha: 192
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  - linear_attn.in_proj_qkv
  - linear_attn.out_proj
  - linear_attn.in_proj_z
  - linear_attn.in_proj_a
  - linear_attn.in_proj_b

gradient_accumulation_steps: 4
micro_batch_size: 2
num_epochs: 3
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 8.0e-5
warmup_ratio: 0.08
weight_decay: 0.01

bf16: true
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
attn_implementation: flash_attention_2

evals_per_epoch: 2
saves_per_epoch: 2
logging_steps: 1
